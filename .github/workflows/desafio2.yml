name: Desafio 02

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  Tarea2-Push:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04

    steps:
      - name: Datos de Push
        run: |
          echo "Autor del push ${{github.event.head_commit.author.name}}"
          echo "Mensaje ${{github.event.head_commit.message}}"
          echo "ID del commit ${{github.sha}}"
          echo "URL del commit ${{github.event.head_commit.url}}"
          echo "Rama ${{github.ref_name}}"
          echo "Repositorio ${{github.repository}}"

  Tarea2-PullRequest:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04

    steps:
      - name: Datos de Pull Request
        run: |
          echo "Datos destino ${{github.event.pull_request.base.ref}}"
          echo "Datos origen ${{github.event.pull_request.head.ref}}"
          echo "Titulo ${{github.event.pull_request.title}}"
          echo "Contenido ${{github.event.pull_request.body}}"
          echo "Estado ${{github.event.pull_request.state}}"
          echo "Fusionado ${{github.event.pull_request.merged}}"
